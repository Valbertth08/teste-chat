<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat Profissional - Fluxo Real</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root { --primary: #075e54; --bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; background: #d1d7db; display: flex; justify-content: center; padding: 20px; }
        .app-container { display: flex; width: 900px; height: 600px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

        /* Sidebar de Conversas */
        .sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .conversa-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
        .conversa-item:hover { background: #f5f5f5; }
        .conversa-item.active { background: #ebebeb; }
        .badge { background: #25d366; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); }

        /* Área do Chat */
        .chat-area { width: 70%; display: flex; flex-direction: column; background: var(--bg); }
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }

        /* Balões de Mensagem */
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; max-width: 70%; position: relative; font-size: 14px; }
        .msg-time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }
        .me { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .them { background: #fff; align-self: flex-start; border-top-left-radius: 0; }

        .input-area { padding: 15px; background: #f0f2f5; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Listagem de Conversas (Simulando Pinia) -->
    <div class="sidebar">
        <div style="padding: 15px; background: #eee;"><strong>Minhas Conversas</strong></div>
        <div id="lista-conversas">
            <!-- Renderizado via JS -->
        </div>
    </div>

    <!-- Janela de Chat -->
    <div class="chat-area">
        <div id="chat-header" style="padding: 15px; background: #f0f2f5; border-bottom: 1px solid #ddd;">
            Selecione uma conversa
        </div>

        <div id="chat-content">
            <!-- Mensagens aparecem aqui -->
        </div>

        <div class="input-area">
            <input type="text" id="messageText" placeholder="Digite uma mensagem..." disabled>
            <button id="btnSend" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL (Simulando Pinia) ---
    const store = {
        meuId: prompt("Digite seu ID para logar (ex: user-1)"),
        conversaAtivaId: null,
        conversas: [
            { id: 'user-2', nome: 'João Silva', unread: 0 },
            { id: 'user-3', nome: 'Maria Souza', unread: 0 }
        ],
        historico: {} // { 'user-2': [msg1, msg2], 'user-3': [] }
    };

    let stompClient = null;

    // --- LOGICA DE CONEXÃO (Ao carregar o app) ---
    function initConnection() {
        const socket = new SockJS('http://localhost:8080/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, (frame) => {
            console.log('Conectado como: ' + store.meuId);

            // Inscrição única para o usuário logado
            stompClient.subscribe('/queue/user.' + store.meuId, (payload) => {
                const msg = JSON.parse(payload.body);
                handleIncomingMessage(msg);
            });
        });
    }

    // --- TRATAMENTO DE MENSAGENS E NOTIFICAÇÕES ---
    function handleIncomingMessage(msg) {
        const remetente = msg.usuarioRemetente;

        // 1. Salva no histórico (Estado)
        if (!store.historico[remetente]) store.historico[remetente] = [];
        store.historico[remetente].push(msg);

        // 2. Lógica de Notificação Inteligente
        if (store.conversaAtivaId === remetente) {
            // Conversa aberta: renderiza na hora
            appendMessage(msg, 'them');
        } else {
            // Conversa fechada: atualiza badge na sidebar
            const conv = store.conversas.find(c => c.id === remetente);
            if (conv) {
                conv.unread++;
                renderSidebar();
                tocarSomNotificacao();
            }
        }
    }

    // --- FUNÇÕES DE UI ---
    function selecionarConversa(id) {
        store.conversaAtivaId = id;
        const conv = store.conversas.find(c => c.id === id);
        conv.unread = 0; // Limpa notificações

        document.getElementById('chat-header').innerText = "Chat com " + conv.nome;
        document.getElementById('messageText').disabled = false;
        document.getElementById('btnSend').disabled = false;

        renderSidebar();
        renderChat();
    }

    function renderSidebar() {
        const container = document.getElementById('lista-conversas');
        container.innerHTML = store.conversas.map(c => `
            <div class="conversa-item ${store.conversaAtivaId === c.id ? 'active' : ''}" onclick="selecionarConversa('${c.id}')">
                ${c.nome}
                ${c.unread > 0 ? `<span class="badge">${c.unread}</span>` : ''}
            </div>
        `).join('');
    }

    function renderChat() {
        const container = document.getElementById('chat-content');
        container.innerHTML = '';
        const msgs = store.historico[store.conversaAtivaId] || [];
        msgs.forEach(m => appendMessage(m, m.usuarioRemetente === store.meuId ? 'me' : 'them'));
    }

    function appendMessage(msg, type) {
        const container = document.getElementById('chat-content');
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerHTML = `
            ${msg.mensagem}
            <span class="msg-time">${now}</span>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const text = document.getElementById('messageText').value;
        if (!text) return;

        const payload = {
            usuarioRemetente: store.meuId,
            usuarioDestinatario: store.conversaAtivaId,
            mensagem: text,
            timestamp: new Date().toISOString()
        };

        stompClient.send("/app/enviar-mensagem-privada.send", {}, JSON.stringify(payload));

        // Adiciona ao estado local e renderiza
        if (!store.historico[store.conversaAtivaId]) store.historico[store.conversaAtivaId] = [];
        store.historico[store.conversaAtivaId].push(payload);

        appendMessage(payload, 'me');
        document.getElementById('messageText').value = "";
    }

    function tocarSomNotificacao() {
        console.log("Ping! Nova mensagem recebida.");
        // Aqui você poderia usar: new Audio('path/to/pop.mp3').play();
    }

    // Iniciar
    if(store.meuId) {
        initConnection();
        renderSidebar();
    }
</script>

</body>
</html>
