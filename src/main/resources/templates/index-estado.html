<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat Real-Time - Spring & Vue Logic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root { --primary: #075e54; --bg-chat: #e5ddd5; --sidebar-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #d1d7db; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .app-container { display: flex; width: 95%; max-width: 1200px; height: 90vh; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: var(--sidebar-bg); }
        .sidebar-header { padding: 20px; background: #ededed; font-weight: bold; border-bottom: 1px solid #ddd; }
        #lista-conversas { flex: 1; overflow-y: auto; }
        .conversa-item { padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.3s; position: relative; }
        .conversa-item:hover { background: #f5f5f5; }
        .conversa-item.active { background: #ebebeb; }
        .conversa-info { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #25d366; color: white; border-radius: 50%; padding: 4px 8px; font-size: 11px; font-weight: bold; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); }
        .chat-header { padding: 15px 25px; background: #ededed; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; }

        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Mensagens */
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 65%; font-size: 14.5px; position: relative; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .them { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: #888; display: block; margin-top: 4px; text-align: right; }

        /* Input */
        .input-area { padding: 15px; background: #f0f2f5; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">Conversas - <span id="user-display">...</span></div>
        <div id="lista-conversas">
            <!-- Renderizado dinamicamente -->
        </div>
    </div>

    <div class="chat-area">
        <div id="chat-header" class="chat-header">Selecione um contato para conversar</div>

        <div id="chat-content">
            <!-- Mensagens do Histórico -->
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Mensagem" disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL (PINIA MOCK) ---
    const store = {
        meuId: "2026988010", // ID vindo da sua API
        conversaAtivaId: null, // UUID da conversa selecionada
        conversas: [],
        historico: {} // Cache de mensagens: { 'uuid-123': [msgs...] }
    };

    let stompClient = null;

    // --- 1. CONEXÃO WEBSOCKET (Inicia ao carregar o app) ---
    function connectWebSocket() {
        const socket = new SockJS('http://localhost:8080/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, (frame) => {
            console.log('Conectado ao STOMP');
            document.getElementById('user-display').innerText = store.meuId;

            // Escuta mensagens privadas destinadas a mim
            stompClient.subscribe(`/queue/user.${store.meuId}`, (payload) => {
                const novaMensagem = JSON.parse(payload.body);
                processarMensagemRecebida(novaMensagem);
            });
        });
    }

    // --- 2. RECUPERAÇÃO DE INFORMAÇÕES (API SPRING) ---
    async function fetchConversas() {
        try {
            // Chamada para o seu @GetMapping("/conversas")
            const response = await fetch(`http://localhost:8080/participante/conversas`);
            const data = await response.json(); // data é o Page<ConversaUsuarioProjection>

            // Mapeando a projeção Java para o estado JS
            store.conversas = data.content.map(c => ({
                id: c.conversa_id, // UUID
                nome: c.nome_destinatario,
                tipo: c.tipo_conversa,
                data: c.data_conversa,
                unread: 0
            }));

            renderSidebar();
        } catch (error) {
            console.error("Erro ao buscar conversas da API:", error);
        }
    }

    // --- 3. LOGICA DE NOTIFICAÇÃO E FLUXO ---
    function processarMensagemRecebida(msg) {
        // Toda mensagem deve vir com conversaId no payload do backend
        const convId = msg.conversaId;

        // 1. Atualizar histórico no estado
        if (!store.historico[convId]) store.historico[convId] = [];
        store.historico[convId].push(msg);

        // 2. Identificar se deve notificar ou exibir
        if (store.conversaAtivaId === convId) {
            appendMessage(msg, 'them');
            // Aqui você enviaria um "marcar como lida" para o back via fetch/socket
        } else {
            const conversa = store.conversas.find(c => c.id === convId);
            if (conversa) {
                conversa.unread++;
                renderSidebar(); // Atualiza o badge na tela
                notificarSom();
            }
        }
    }

    // --- 4. FUNÇÕES DE UI (REATIVIDADE MANUAL) ---
    function selecionarConversa(id) {
        store.conversaAtivaId = id;
        const conv = store.conversas.find(c => c.id === id);
        conv.unread = 0; // Limpa notificações localmente

        // Habilita campos
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chat-header').innerHTML = `<strong>${conv.nome}</strong>`;

        renderSidebar();
        renderHistorico();
    }

    function renderSidebar() {
        const lista = document.getElementById('lista-conversas');
        lista.innerHTML = store.conversas.map(c => `
            <div class="conversa-item ${store.conversaAtivaId === c.id ? 'active' : ''}" onclick="selecionarConversa('${c.id}')">
                <div class="conversa-info">
                    <span>${c.nome}</span>
                    ${c.unread > 0 ? `<span class="badge">${c.unread}</span>` : ''}
                </div>
                <div style="font-size: 10px; color: #999; margin-top: 5px;">
                    ${new Date(c.data).toLocaleString()}
                </div>
            </div>
        `).join('');
    }

    function renderHistorico() {
        const container = document.getElementById('chat-content');
        container.innerHTML = '';
        const mensagens = store.historico[store.conversaAtivaId] || [];
        mensagens.forEach(m => {
            appendMessage(m, m.usuarioRemetente === store.meuId ? 'me' : 'them');
        });
    }

    function appendMessage(msg, type) {
        const container = document.getElementById('chat-content');
        const div = document.createElement('div');
        div.className = `msg ${type}`;

        const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        div.innerHTML = `
            <div>${msg.mensagem}</div>
            <span class="msg-time">${hora}</span>
        `;

        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const texto = input.value.trim();

        if (!texto || !store.conversaAtivaId) return;

        const payload = {
            conversaId: store.conversaAtivaId,
            usuarioRemetente: store.meuId,
            mensagem: texto,
            timestamp: new Date().toISOString()
        };

        // Envio para o @MessageMapping do Spring
        stompClient.send("/app/enviar-mensagem-privada.send", {}, JSON.stringify(payload));

        // Atualiza localmente
        if (!store.historico[store.conversaAtivaId]) store.historico[store.conversaAtivaId] = [];
        store.historico[store.conversaAtivaId].push(payload);

        appendMessage(payload, 'me');
        input.value = '';
    }

    function notificarSom() {
        // Simulação de som/notificação visual no título da página
        document.title = "(*) Nova Mensagem!";
        setTimeout(() => document.title = "Chat Real-Time", 3000);
    }

    // --- INICIALIZAÇÃO ---
    window.onload = () => {
        connectWebSocket();
        fetchConversas();
    };

</script>

</body>
</html>
